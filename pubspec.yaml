name: gest_pro
description: "GestPro es una app móvil de gestión de proyectos y finanzas. Controla proyectos, tareas, materiales, pagos, cobros, calendario y eventos desde el móvil."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  file_selector: ^1.0.3
  table_calendar: ^3.2.0
  google_fonts: ^6.3.0
  fl_chart: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icono.png"
  adaptive_icon_background: "#FAF0E6"
  adaptive_icon_foreground: "assets/icono.png"
  min_sdk_android: 21
  
flutter:
  uses-material-design: true
  assets:
    - assets/icono.png
    - assets/splash.png
    - assets/logo.png